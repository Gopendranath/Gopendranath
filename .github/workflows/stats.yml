name: Update Language Statistics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Language Stats
        uses: stefvuck/github-profile-language-analytics@v1
        with:
          github_token: ${{ secrets.STATS_TOKEN }}
          visualization_types: "pie donut"
          exclude_languages: "HTML,CSS,Markdown"
          include_forks: "true"
          output_path: "stats"
          dark_mode: "true"
